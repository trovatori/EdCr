<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edizione Critica Digitale</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header class="main-header">
        <nav class="navbar">
            <h1 class="edition-title">Inferno, I</h1>
            <ul class="nav-menu">
                <li class="dropdown">
                    <button class="dropbtn">Introduzione ▼</button>
                    <div class="dropdown-content" id="nav-intro"></div>
                </li>
                <li class="dropdown">
                    <button class="dropbtn">Nota al testo ▼</button>
                    <div class="dropdown-content" id="nav-apparatus"></div>
                </li>
                <li class="dropdown">
                    <button class="dropbtn">Testimoni ▼</button>
                    <div class="dropdown-content" id="nav-witnesses"></div>
                </li>
            </ul>
        </nav>
    </header>

    <div class="main-wrapper">
        <section class="text-column">
            <div id="tei-body" class="poetry-content"></div>
        </section>

        <aside class="apparatus-sidebar">
            <div class="sidebar-section" id="variants-section">
                <div class="section-header">Apparato critico</div>
                <div id="variants-content" class="scroll-area"></div>
            </div>
            
            <div class="sidebar-section" id="notes-section">
                <div class="section-header">Note di commento</div>
                <div id="notes-content" class="scroll-area"></div>
            </div>
        </aside>
    </div>

    <div id="modal" class="modal">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
